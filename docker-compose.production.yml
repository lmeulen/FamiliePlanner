version: '3.8'

# Production deployment with HTTPS via Nginx + Let's Encrypt
#
# Usage:
#   1. Set environment variables in .env:
#      - DOMAIN=familieplanner.yourdomain.com
#      - EMAIL=your-email@example.com (for Let's Encrypt)
#   2. Run: docker-compose -f docker-compose.production.yml up -d
#   3. Initial cert: docker-compose -f docker-compose.production.yml run --rm certbot certonly --webroot --webroot-path /var/www/certbot -d ${DOMAIN}
#   4. Restart nginx: docker-compose -f docker-compose.production.yml restart nginx

services:
  # ── FamiliePlanner Web Application ────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: familieplanner
    restart: unless-stopped
    expose:
      - "8000"  # Internal only, not exposed to host
    volumes:
      # Persist database and uploads
      - ./data:/app/data
      - ./app/static/uploads:/app/static/uploads
    environment:
      # Database
      - DATABASE_URL=sqlite+aiosqlite:///./data/familieplanner.db

      # Authentication
      - AUTH_REQUIRED=true
      - APP_USERNAME=${APP_USERNAME}
      - APP_PASSWORD=${APP_PASSWORD}

      # Security
      - SECRET_KEY=${SECRET_KEY}

      # OpenWeather API (optional)
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY:-}

      # Application
      - APP_TITLE=FamiliePlanner
      - APP_VERSION=1.0.0
      - ENVIRONMENT=production
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - familieplanner

  # ── Nginx Reverse Proxy ─────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: familieplanner-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    environment:
      - DOMAIN=${DOMAIN}
    command: /bin/sh -c "envsubst '$$DOMAIN' < /etc/nginx/nginx.conf > /etc/nginx/nginx.conf.tmp && mv /etc/nginx/nginx.conf.tmp /etc/nginx/nginx.conf && nginx -g 'daemon off;'"
    depends_on:
      - app
    networks:
      - familieplanner

  # ── Certbot (Let's Encrypt) ─────────────────────────────────────
  certbot:
    image: certbot/certbot
    container_name: familieplanner-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    # Auto-renewal: run every 12 hours
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - familieplanner

networks:
  familieplanner:
    driver: bridge
