version: '3.8'

services:
  # ── FamiliePlanner Web Application ────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: familieplanner
    restart: unless-stopped
    ports:
      - "8002:8000"
    volumes:
      # Persist database and uploads
      - ./data:/app/data
      - ./app/static/uploads:/app/static/uploads
    environment:
      # Database
      - DATABASE_URL=sqlite+aiosqlite:///./data/familieplanner.db

      # Authentication (set to false to disable login)
      - AUTH_REQUIRED=true
      - APP_USERNAME=${APP_USERNAME:-admin}
      - APP_PASSWORD=${APP_PASSWORD:-changeme}

      # Security
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}

      # OpenWeather API (optional)
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY:-}

      # Application
      - APP_TITLE=FamiliePlanner
      - APP_VERSION=1.0.0
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - familieplanner

  # ── Prometheus (Optional Monitoring) ───────────────────────────
  # Uncomment to enable monitoring with Prometheus + Grafana

  # prometheus:
  #   image: prom/prometheus:latest
  #   container_name: familieplanner-prometheus
  #   restart: unless-stopped
  #   ports:
  #     - "9090:9090"
  #   volumes:
  #     - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
  #     - prometheus-data:/prometheus
  #   command:
  #     - '--config.file=/etc/prometheus/prometheus.yml'
  #     - '--storage.tsdb.path=/prometheus'
  #     - '--storage.tsdb.retention.time=30d'
  #   networks:
  #     - familieplanner

  # ── Grafana (Optional Dashboard) ───────────────────────────────

  # grafana:
  #   image: grafana/grafana:latest
  #   container_name: familieplanner-grafana
  #   restart: unless-stopped
  #   ports:
  #     - "3000:3000"
  #   volumes:
  #     - grafana-data:/var/lib/grafana
  #     - ./docs/grafana-dashboard.json:/etc/grafana/provisioning/dashboards/familieplanner.json:ro
  #   environment:
  #     - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
  #     - GF_USERS_ALLOW_SIGN_UP=false
  #   networks:
  #     - familieplanner

networks:
  familieplanner:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
