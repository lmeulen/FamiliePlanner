{% extends "base.html" %}
{% block title %}Gezin – FamiliePlanner{% endblock %}
{% block nav_family %}active{% endblock %}

{% block content %}
<div class="page-header">
  <h1 class="page-title">👨‍👩‍👧‍👦 Gezin</h1>
  <p class="page-subtitle">Beheer je gezinsleden</p>
</div>

<div id="family-list" class="family-grid">
  <div class="skeleton-list">
    <div class="skeleton"></div><div class="skeleton"></div>
  </div>
</div>

<!-- FAB: add member -->
<button class="fab" id="btn-add-member" aria-label="Gezinslid toevoegen">＋</button>

<!-- Member form template -->
<template id="tpl-member-form">
  <form id="member-form" class="modal-form">
    <h3 class="modal-title" id="member-form-title">Gezinslid toevoegen</h3>
    <label>Naam *
      <input type="text" name="name" required maxlength="50" placeholder="Bijv. Emma" />
    </label>
    <label>Kleur
      <input type="color" name="color" value="#4ECDC4" />
    </label>
    <label>Emoji avatar
      <input type="text" name="avatar" maxlength="4" placeholder="👤" value="👤" />
    </label>
    <div class="form-actions">
      <button type="submit" class="btn btn--primary">Opslaan</button>
      <button type="button" class="btn btn--danger hidden" id="btn-delete-member">Verwijderen</button>
    </div>
  </form>
</template>
{% endblock %}

{% block extra_js %}
<script src="/static/js/family.js?v={{ static_v }}"></script>
{% endblock %}
