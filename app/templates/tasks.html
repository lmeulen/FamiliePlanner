{% extends "base.html" %}
{% block title %}Taken – FamiliePlanner{% endblock %}
{% block nav_tasks %}active{% endblock %}

{% block content %}
<div class="page-header">
  <h1 class="page-title">✅ Taken</h1>
</div>

<!-- List tabs -->
<div class="list-tabs-row">
  <div class="list-tabs" id="list-tabs" role="tablist">
    <button class="list-tab active" data-list="all" role="tab" aria-selected="true">Alle</button>
    <!-- Dynamic list tabs added by JS -->
  </div>
  <button class="icon-btn" id="btn-add-list" aria-label="Nieuwe lijst" title="Nieuwe lijst">＋</button>
  <button class="icon-btn" id="btn-manage-lists" aria-label="Lijsten beheren" title="Lijsten beheren">⚙</button>
</div>

<!-- Member filter -->
<div class="member-chips" id="tasks-member-chips">
  <button class="chip chip--all chip--active" data-member="all">Allen</button>
</div>

<!-- Filter: show done -->
<div class="filter-row">
  <label class="toggle-label">
    <input type="checkbox" id="show-done" />
    <span>Afgerond tonen</span>
  </label>
</div>

<!-- Task list body -->
<div id="tasks-body" class="tasks-body">
  <div class="skeleton-list">
    <div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>
  </div>
</div>

<p class="empty-state hidden" id="tasks-empty">Geen taken 🎉</p>

<!-- FAB: add task -->
<button class="fab" id="btn-add-task" aria-label="Taak toevoegen">＋</button>

<!-- Task form template -->
<template id="tpl-task-form">
  <form id="task-form" class="modal-form">
    <h3 class="modal-title" id="task-form-title">Taak toevoegen</h3>
    <label>Titel *
      <input type="text" name="title" required minlength="1" maxlength="200" placeholder="Bijv. Melk kopen" />
    </label>
    <label>Beschrijving
      <textarea name="description" rows="2" maxlength="1000"></textarea>
    </label>
    <label>Lijst *
      <select name="list_id" required></select>
    </label>
    <label>Gezinsleden
      <div class="member-picker" id="task-member-picker"></div>
    </label>
    <label>Vervaldatum
      <input type="date" name="due_date" />
    </label>

    <!-- Recurrence toggle (new task only) -->
    <div id="recurrence-toggle-row" class="form-row">
      <label class="toggle-label">
        <input type="checkbox" id="recurrence-toggle" />
        <span>Herhalende taak</span>
      </label>
    </div>

    <!-- Recurrence fields -->
    <div id="recurrence-fields" class="hidden">
      <label>Herhaling
        <select name="recurrence_type" id="task-recurrence-type-select">
          <option value="daily">Dagelijks</option>
          <option value="every_other_day">Om de dag</option>
          <option value="weekdays">Werkdagen</option>
          <option value="weekly" selected>Wekelijks</option>
          <option value="biweekly">Tweewekelijks</option>
          <option value="monthly">Maandelijks</option>
        </select>
      </label>

      <!-- Interval input (shown for daily/weekly/monthly) -->
      <div id="task-interval-section" class="hidden">
        <label class="interval-inline">Herhaal elke
          <input type="number" name="interval" value="1" min="1" max="365" />
          <span id="task-interval-unit" class="interval-unit">weken</span>
        </label>
      </div>

      <!-- Monthly pattern selector (shown when monthly selected) -->
      <div id="task-monthly-pattern-section" class="hidden">
        <label>Maandelijks op
          <select name="monthly_pattern" id="task-monthly-pattern-select">
            <option value="day_of_month">Dag van de maand</option>
            <option value="first_monday">Eerste maandag</option>
            <option value="first_tuesday">Eerste dinsdag</option>
            <option value="first_wednesday">Eerste woensdag</option>
            <option value="first_thursday">Eerste donderdag</option>
            <option value="first_friday">Eerste vrijdag</option>
            <option value="last_monday">Laatste maandag</option>
            <option value="last_tuesday">Laatste dinsdag</option>
            <option value="last_wednesday">Laatste woensdag</option>
            <option value="last_thursday">Laatste donderdag</option>
            <option value="last_friday">Laatste vrijdag</option>
          </select>
        </label>
      </div>

      <!-- End condition toggle -->
      <div class="end-condition-toggle">
        <label class="radio-label">
          <input type="radio" name="end_condition" value="date" checked />
          Op datum
        </label>
        <label class="radio-label">
          <input type="radio" name="end_condition" value="count" />
          Na aantal keren
        </label>
      </div>

      <div id="task-end-date-section">
        <label>Einddatum reeks *
          <input type="date" name="series_end" />
          <span class="field-error hidden" id="task-series-end-error">Einddatum moet na vervaldatum liggen</span>
        </label>
      </div>

      <div id="task-end-count-section" class="hidden">
        <label>Aantal herhalingen *
          <input type="number" name="count" min="1" max="365" placeholder="Bijv. 10" />
        </label>
      </div>
    </div>

    <!-- Scope selector (edit of series task) -->
    <div id="scope-selector" class="hidden">
      <p class="form-hint">Dit is een herhalende taak. Wat wil je bewerken?</p>
      <label class="radio-label">
        <input type="radio" name="edit_scope" value="this" checked /> Alleen deze taak
      </label>
      <label class="radio-label">
        <input type="radio" name="edit_scope" value="series" /> Hele reeks
      </label>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn--primary">Opslaan</button>
      <button type="button" class="btn btn--danger hidden" id="btn-delete-task">Verwijderen</button>
    </div>
  </form>
</template>

<!-- List form template -->
<template id="tpl-list-form">
  <form id="list-form" class="modal-form">
    <h3 class="modal-title">Nieuwe lijst</h3>
    <label>Naam *
      <input type="text" name="name" required minlength="1" maxlength="100" placeholder="Bijv. Boodschappen" />
    </label>
    <label>Kleur
      <input type="color" name="color" value="#4ECDC4" />
    </label>
    <div class="form-actions">
      <button type="submit" class="btn btn--primary">Aanmaken</button>
    </div>
  </form>
</template>

<!-- Manage lists template -->
<template id="tpl-manage-lists">
  <div id="manage-lists-panel">
    <h3 class="modal-title">Lijsten beheren</h3>
    <p class="form-hint">Gebruik de pijlen om de volgorde aan te passen. Verlopen taken kan ook verplaatst worden.</p>
    <div id="manage-lists-order" class="manage-lists-order"></div>
    <div class="form-actions">
      <button type="button" class="btn btn--primary" id="btn-save-list-order">Volgorde opslaan</button>
    </div>
  </div>
</template>
{% endblock %}

{% block extra_js %}
<script src="/static/js/tasks.js?v={{ static_v }}"></script>
{% endblock %}
