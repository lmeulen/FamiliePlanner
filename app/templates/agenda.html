{% extends "base.html" %}
{% block title %}Agenda – FamiliePlanner{% endblock %}
{% block nav_agenda %}active{% endblock %}

{% block content %}
<div class="page-header">
  <h1 class="page-title">📅 Agenda</h1>
</div>

<!-- View controls -->
<div class="view-controls">
  <div class="view-controls-left">
    <button class="view-btn view-btn--hide-mobile" data-view="day">Dag</button>
    <div class="view-btn-group">
      <button class="view-btn" data-view="multiday">
        <span id="multiday-label" data-count="3" data-full="3 Dagen" data-short="3 dgn">3 Dagen</span>
      </button>
      <button class="view-btn-control" id="multiday-decrease" aria-label="Minder dagen" title="Minder dagen">−</button>
      <button class="view-btn-control" id="multiday-increase" aria-label="Meer dagen" title="Meer dagen">+</button>
    </div>
    <button class="view-btn view-btn--hide-mobile" data-view="week">Week</button>
    <button class="view-btn" data-view="month">Maand</button>
    <button class="view-btn active" data-view="list">Lijst</button>
  </div>
  <button class="view-btn view-btn--today" id="btn-today">Vandaag</button>
</div>

<!-- Calendar navigation -->
<div class="cal-nav">
  <button class="icon-btn" id="cal-prev" aria-label="Vorige periode">&lsaquo;</button>
  <h2 class="cal-title" id="cal-title"></h2>
  <button class="icon-btn" id="cal-next" aria-label="Volgende periode">&rsaquo;</button>
</div>

<!-- Member filter -->
<div class="member-chips" id="agenda-member-chips">
  <button class="chip chip--all chip--active" data-member="all">Allen</button>
</div>

<!-- Member filter (mobile dropdown) -->
<div class="member-select-mobile">
  <select id="agenda-member-select-mobile" aria-label="Filter op gezinslid">
    <option value="all">Allen</option>
  </select>
</div>

<!-- Calendar grid -->
<div id="cal-view" class="cal-view">
  <div id="cal-skeleton" class="skeleton-list hidden">
    <div class="skeleton" style="height: 80px;"></div>
    <div class="skeleton" style="height: 60px;"></div>
    <div class="skeleton" style="height: 70px;"></div>
    <div class="skeleton" style="height: 50px;"></div>
  </div>
</div>

<!-- Events list (list view) -->
<div id="events-list-view" class="card-list hidden">
  <div id="list-skeleton" class="skeleton-list hidden">
    <div class="skeleton"></div>
    <div class="skeleton"></div>
    <div class="skeleton"></div>
  </div>
</div>

<!-- FAB: add event -->
<button class="fab" id="btn-add-event" aria-label="Afspraak toevoegen">＋</button>

<!-- Event form (inside modal, rendered by JS) -->
<template id="tpl-event-form">
  <form id="event-form" class="modal-form">
    <h3 class="modal-title" id="event-form-title">Afspraak toevoegen</h3>
    <label>Titel *
      <input type="text" name="title" required minlength="1" maxlength="200" placeholder="Bijv. Voetbaltraining" />
    </label>
    <label>Beschrijving
      <textarea name="description" rows="2" maxlength="1000" placeholder="Optionele details"></textarea>
    </label>
    <label>Locatie
      <input type="text" name="location" maxlength="200" placeholder="Bijv. Sporthal" />
    </label>
    <div class="form-row">
      <label>Van *
        <input type="datetime-local" name="start_time" required />
      </label>
      <label>Tot *
        <input type="datetime-local" name="end_time" required />
        <span class="field-error hidden" id="end-time-error">Eindtijd moet na starttijd liggen</span>
      </label>
    </div>
    <label class="checkbox-label">
      <input type="checkbox" name="all_day" />
      Hele dag
    </label>
    <label>Gezinsleden
      <div class="member-picker" id="event-member-picker"></div>
    </label>

    <!-- Recurrence toggle (only shown when creating a new event) -->
    <label class="checkbox-label" id="recurrence-toggle-row">
      <input type="checkbox" id="recurrence-toggle" />
      Herhaling instellen
    </label>

    <!-- Recurrence section: shown when toggle is on OR when editing a series event -->
    <div id="recurrence-section" class="hidden">

      <!-- Scope selector: only shown when editing an existing series event -->
      <div id="series-scope-selector" class="hidden">
        <div class="form-section-label">🔁 Onderdeel van een reeks</div>
        <p class="form-hint">Wat wil je bewerken?</p>
        <div class="scope-options">
          <label class="radio-label">
            <div style="display: flex; align-items: center; gap: .5rem;">
              <input type="radio" name="edit_scope" value="this" checked />
              <strong>Alleen deze afspraak</strong>
            </div>
            <span class="form-hint-inline">Past alleen dit exemplaar aan</span>
          </label>
          <label class="radio-label">
            <div style="display: flex; align-items: center; gap: .5rem;">
              <input type="radio" name="edit_scope" value="series" />
              <strong>Hele reeks</strong>
            </div>
            <span class="form-hint-inline">Past alle toekomstige afspraken in deze reeks aan</span>
          </label>
        </div>
      </div>

      <!-- Recurrence rule fields: shown when creating OR when scope=series -->
      <div id="recurrence-fields">
        <label>Herhaling
          <select name="recurrence_type" id="recurrence-type-select">
            <option value="daily">Dagelijks</option>
            <option value="every_other_day">Om de dag</option>
            <option value="weekly" selected>Wekelijks</option>
            <option value="biweekly">Tweewekelijks</option>
            <option value="weekdays">Werkdagen (ma–vr)</option>
            <option value="monthly">Maandelijks</option>
            <option value="yearly">Jaarlijks</option>
          </select>
        </label>

        <!-- Interval input (shown for daily/weekly/monthly) -->
        <div id="interval-section" class="hidden">
          <label class="interval-inline">Herhaal elke
            <input type="number" name="interval" value="1" min="1" max="365" />
            <span id="interval-unit" class="interval-unit">weken</span>
          </label>
        </div>

        <!-- Monthly pattern selector (shown when monthly selected) -->
        <div id="monthly-pattern-section" class="hidden">
          <label>Maandelijks op
            <select name="monthly_pattern" id="monthly-pattern-select">
              <option value="day_of_month">Dag van de maand</option>
              <optgroup label="Eerste">
                <option value="first_monday">Maandag</option>
                <option value="first_tuesday">Dinsdag</option>
                <option value="first_wednesday">Woensdag</option>
                <option value="first_thursday">Donderdag</option>
                <option value="first_friday">Vrijdag</option>
                <option value="first_saturday">Zaterdag</option>
                <option value="first_sunday">Zondag</option>
              </optgroup>
              <optgroup label="Tweede">
                <option value="second_monday">Maandag</option>
                <option value="second_tuesday">Dinsdag</option>
                <option value="second_wednesday">Woensdag</option>
                <option value="second_thursday">Donderdag</option>
                <option value="second_friday">Vrijdag</option>
                <option value="second_saturday">Zaterdag</option>
                <option value="second_sunday">Zondag</option>
              </optgroup>
              <optgroup label="Derde">
                <option value="third_monday">Maandag</option>
                <option value="third_tuesday">Dinsdag</option>
                <option value="third_wednesday">Woensdag</option>
                <option value="third_thursday">Donderdag</option>
                <option value="third_friday">Vrijdag</option>
                <option value="third_saturday">Zaterdag</option>
                <option value="third_sunday">Zondag</option>
              </optgroup>
              <optgroup label="Vierde">
                <option value="fourth_monday">Maandag</option>
                <option value="fourth_tuesday">Dinsdag</option>
                <option value="fourth_wednesday">Woensdag</option>
                <option value="fourth_thursday">Donderdag</option>
                <option value="fourth_friday">Vrijdag</option>
                <option value="fourth_saturday">Zaterdag</option>
                <option value="fourth_sunday">Zondag</option>
              </optgroup>
              <optgroup label="Laatste">
                <option value="last_monday">Maandag</option>
                <option value="last_tuesday">Dinsdag</option>
                <option value="last_wednesday">Woensdag</option>
                <option value="last_thursday">Donderdag</option>
                <option value="last_friday">Vrijdag</option>
                <option value="last_saturday">Zaterdag</option>
                <option value="last_sunday">Zondag</option>
              </optgroup>
            </select>
          </label>
        </div>

        <!-- End condition toggle -->
        <div class="end-condition-toggle">
          <label class="radio-label">
            <input type="radio" name="end_condition" value="date" checked />
            Op datum
          </label>
          <label class="radio-label">
            <input type="radio" name="end_condition" value="count" />
            Na aantal keren
          </label>
          <label class="radio-label">
            <input type="radio" name="end_condition" value="infinite" />
            Geen einddatum
          </label>
        </div>

        <div id="end-date-section">
          <label>Einddatum reeks *
            <input type="date" name="series_end" />
            <span class="field-error hidden" id="series-end-error">Einddatum moet na startdatum liggen</span>
          </label>
        </div>

        <div id="end-count-section" class="hidden">
          <label>Aantal herhalingen *
            <input type="number" name="count" min="1" max="365" placeholder="Bijv. 10" />
          </label>
        </div>

        <div id="infinite-hint-section" class="hidden">
          <p class="form-hint">
            ℹ️ Deze reeks blijft oneindig herhalen. Er worden afspraken tot 1 jaar vooruit aangemaakt.
          </p>
        </div>
      </div>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn--primary">Opslaan</button>
      <button type="button" class="btn btn--danger hidden" id="btn-delete-event">Verwijderen</button>
      <button type="button" class="icon-btn hidden" id="btn-export-event" title="Exporteer naar kalender (.ics)" aria-label="Exporteer naar kalender">📥</button>
    </div>
  </form>
</template>
{% endblock %}

{% block extra_js %}
<script src="/static/js/agenda-db.js?v={{ static_v }}"></script>
<script src="/static/js/agenda.js?v={{ static_v }}"></script>
{% endblock %}
