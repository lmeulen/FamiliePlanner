<!DOCTYPE html>
<html lang="nl" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="csrf-token" content="{{ request.state.csrf_token }}" />
  <meta name="theme-color" content="#6C5CE7" />
  <title>{% block title %}FamiliePlanner{% endblock %}</title>

  <!-- Favicon (emoji) -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏠</text></svg>"/>

  <!-- CSS -->
  <link rel="stylesheet" href="/static/css/themes.css?v={{ static_v }}" />
  <link rel="stylesheet" href="/static/css/main.css?v={{ static_v }}" />
  {% block extra_css %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">

  <!-- ──────────── SIDE NAVIGATION ──────────── -->
  <nav class="side-nav" role="navigation" aria-label="Hoofdnavigatie">
    <a href="/"          class="nav-item {% block nav_dashboard %}{% endblock %}" aria-label="Dashboard">
      <span class="nav-icon">🏠</span>
      <span class="nav-label">Overzicht</span>
    </a>
    <a href="/agenda"    class="nav-item {% block nav_agenda %}{% endblock %}" aria-label="Agenda">
      <span class="nav-icon">📅</span>
      <span class="nav-label">Agenda</span>
    </a>
    <a href="/taken"     class="nav-item {% block nav_tasks %}{% endblock %}" aria-label="Taken">
      <span class="nav-icon">✅</span>
      <span class="nav-label">Taken</span>
    </a>
    <a href="/maaltijden" class="nav-item {% block nav_meals %}{% endblock %}" aria-label="Maaltijden">
      <span class="nav-icon">🍽️</span>
      <span class="nav-label">Eten</span>
    </a>
    <a href="/gezin"     class="nav-item {% block nav_family %}{% endblock %}" aria-label="Gezin">
      <span class="nav-icon">👨‍👩‍👧‍👦</span>
      <span class="nav-label">Gezin</span>
    </a>
    <a href="/fotos"     class="nav-item {% block nav_photos %}{% endblock %}" aria-label="Foto's">
      <span class="nav-icon">🖼️</span>
      <span class="nav-label">Foto's</span>
    </a>
    <a href="/zoeken"    class="nav-item {% block nav_search %}{% endblock %}" aria-label="Zoeken">
      <span class="nav-icon">🔍</span>
      <span class="nav-label">Zoeken</span>
    </a>
    <a href="/statistieken" class="nav-item {% block nav_stats %}{% endblock %}" aria-label="Statistieken">
      <span class="nav-icon">📊</span>
      <span class="nav-label">Statistieken</span>
    </a>
    <a href="/instellingen" class="nav-item {% block nav_settings %}{% endblock %}" aria-label="Instellingen">
      <span class="nav-icon">⚙️</span>
      <span class="nav-label">Instellingen</span>
    </a>
    <a href="/logout" class="nav-item nav-item--logout" aria-label="Uitloggen" title="Uitloggen">
      <span class="nav-icon">🚪</span>
      <span class="nav-label">Uitloggen</span>
    </a>
  </nav>

  <!-- ──────────── APP CONTENT ──────────── -->
  <div class="app-content">

    <!-- ──────────── MAIN CONTENT ──────────── -->
    <main class="app-main">
      <div class="page-container">
        {% block content %}{% endblock %}
      </div>
    </main>

  </div><!-- /.app-content -->

  <!-- ──────────── MODAL CONTAINER ──────────── -->
  <div id="modal-overlay" class="modal-overlay hidden" role="dialog" aria-modal="true">
    <div class="modal-box" id="modal-box">
      <button class="modal-close" id="modal-close" aria-label="Sluiten">&times;</button>
      <div id="modal-content"></div>
    </div>
  </div>

  <!-- ──────────── TOAST NOTIFICATIONS ──────────── -->
  <div id="toast-container" aria-live="polite"></div>

  <!-- ──────────── SCRIPTS ──────────── -->
  <script src="/static/js/cache.js?v={{ static_v }}"></script>
  <script src="/static/js/api.js?v={{ static_v }}"></script>
  <script src="/static/js/modal.js?v={{ static_v }}"></script>
  <script src="/static/js/toast.js?v={{ static_v }}"></script>
  <script src="/static/js/theme.js?v={{ static_v }}"></script>
  <script src="/static/js/app.js?v={{ static_v }}"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
