<!DOCTYPE html>
<html lang="nl" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="csrf-token" content="{{ request.state.csrf_token }}" />
  <meta name="theme-color" content="#6C5CE7" />
  <meta name="description" content="Familie organisatie app voor agenda, taken en maaltijden" />
  <title>{% block title %}FamiliePlanner{% endblock %}</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="/static/manifest.json" />

  <!-- Favicon (emoji) -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏠</text></svg>"/>

  <!-- iOS PWA Meta Tags -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="FamiliePlanner" />
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏠</text></svg>" />

  <!-- CSS -->
  <link rel="stylesheet" href="/static/css/themes.css?v={{ static_v }}" />
  <link rel="stylesheet" href="/static/css/main.css?v={{ static_v }}" />
  {% block extra_css %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">

  <!-- ──────────── SIDE NAVIGATION ──────────── -->
  <nav class="side-nav" role="navigation" aria-label="Hoofdnavigatie" data-i18n-aria-label="nav.mainAria">
    <a href="/"          class="nav-item {% block nav_dashboard %}{% endblock %}" aria-label="Dashboard" data-i18n-aria-label="nav.dashboard">
      <span class="nav-icon">🏠</span>
      <span class="nav-label" data-i18n="nav.dashboard">Overzicht</span>
    </a>
    <a href="/agenda"    class="nav-item {% block nav_agenda %}{% endblock %}" aria-label="Agenda" data-i18n-aria-label="nav.agenda">
      <span class="nav-icon">📅</span>
      <span class="nav-label" data-i18n="nav.agenda">Agenda</span>
    </a>
    <a href="/taken"     class="nav-item {% block nav_tasks %}{% endblock %}" aria-label="Taken" data-i18n-aria-label="nav.tasks">
      <span class="nav-icon">✅</span>
      <span class="nav-label" data-i18n="nav.tasks">Taken</span>
    </a>
    <a href="/maaltijden" class="nav-item {% block nav_meals %}{% endblock %}" aria-label="Maaltijden" data-i18n-aria-label="nav.meals">
      <span class="nav-icon">🍽️</span>
      <span class="nav-label" data-i18n="nav.meals">Eten</span>
    </a>
    <a href="/boodschappen" class="nav-item {% block nav_grocery %}{% endblock %}" aria-label="Boodschappenlijst" data-i18n-aria-label="nav.grocery">
      <span class="nav-icon">🛒</span>
      <span class="nav-label" data-i18n="nav.grocery">Boodschappen</span>
    </a>
    <a href="/gezin"     class="nav-item {% block nav_family %}{% endblock %}" aria-label="Gezin" data-i18n-aria-label="nav.family">
      <span class="nav-icon">👨‍👩‍👧‍👦</span>
      <span class="nav-label" data-i18n="nav.family">Gezin</span>
    </a>
    <a href="/fotos"     class="nav-item {% block nav_photos %}{% endblock %}" aria-label="Foto's" data-i18n-aria-label="nav.photos">
      <span class="nav-icon">🖼️</span>
      <span class="nav-label" data-i18n="nav.photos">Foto's</span>
    </a>
    <a href="/zoeken"    class="nav-item {% block nav_search %}{% endblock %}" aria-label="Zoeken" data-i18n-aria-label="nav.search">
      <span class="nav-icon">🔍</span>
      <span class="nav-label" data-i18n="nav.search">Zoeken</span>
    </a>
    <a href="/instellingen" class="nav-item {% block nav_settings %}{% endblock %}" aria-label="Instellingen" data-i18n-aria-label="nav.settings">
      <span class="nav-icon">⚙️</span>
      <span class="nav-label" data-i18n="nav.settings">Instellingen</span>
    </a>
    <a href="/logout" class="nav-item nav-item--logout" aria-label="Uitloggen" title="Uitloggen" data-i18n-aria-label="nav.logout" data-i18n-title="nav.logout">
      <span class="nav-icon">🚪</span>
      <span class="nav-label" data-i18n="nav.logout">Uitloggen</span>
    </a>
  </nav>

  <!-- ──────────── APP CONTENT ──────────── -->
  <div class="app-content">

    <!-- ──────────── MAIN CONTENT ──────────── -->
    <main class="app-main">
      <div class="page-container">
        {% block content %}{% endblock %}
      </div>
    </main>

  </div><!-- /.app-content -->

  <!-- ──────────── MODAL CONTAINER ──────────── -->
  <div id="modal-overlay" class="modal-overlay hidden" role="dialog" aria-modal="true">
    <div class="modal-box" id="modal-box">
      <button class="modal-close" id="modal-close" aria-label="Sluiten" data-i18n-aria-label="common.close">&times;</button>
      <div id="modal-content"></div>
    </div>
  </div>

  <!-- ──────────── TOAST NOTIFICATIONS ──────────── -->
  <div id="toast-container" aria-live="polite"></div>

  <!-- ──────────── SCRIPTS ──────────── -->
  <script src="/static/js/cache.js?v={{ static_v }}"></script>
  <script src="/static/js/api.js?v={{ static_v }}"></script>
  <script src="/static/js/modal.js?v={{ static_v }}"></script>
  <script src="/static/js/toast.js?v={{ static_v }}"></script>
  <script src="/static/js/theme.js?v={{ static_v }}"></script>
  <script src="/static/js/app.js?v={{ static_v }}"></script>
  <script src="/static/js/form-controllers/recurrence-ui.js?v={{ static_v }}"></script>
  <script src="/static/js/form-controllers/event-form.js?v={{ static_v }}"></script>
  <script src="/static/js/form-controllers/task-form.js?v={{ static_v }}"></script>
  <script src="/static/js/pwa-install.js?v={{ static_v }}"></script>
  {% block extra_js %}{% endblock %}

  <!-- ──────────── PWA SERVICE WORKER ──────────── -->
  <script>
    // Register service worker for PWA functionality
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/static/sw.js')
          .then(registration => {
            console.log('[PWA] Service Worker registered:', registration.scope);

            // Check for updates periodically
            registration.addEventListener('updatefound', () => {
              const newWorker = registration.installing;
              newWorker.addEventListener('statechange', () => {
                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  // New version available, show update prompt
                  if (window.Toast) {
                    Toast.show('Nieuwe versie beschikbaar! Ververs de pagina.', 'info');
                  }
                }
              });
            });
          })
          .catch(error => {
            console.error('[PWA] Service Worker registration failed:', error);
          });
      });

      // Handle offline/online events
      window.addEventListener('online', () => {
        if (window.Toast) {
          Toast.show('Verbinding hersteld', 'success');
        }
      });

      window.addEventListener('offline', () => {
        if (window.Toast) {
          Toast.show('Offline modus - sommige functies niet beschikbaar', 'warning');
        }
      });
    }

    // Detect if app is running as PWA (standalone mode)
    if (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches) {
      console.log('[PWA] Running in standalone mode');
      document.documentElement.classList.add('pwa-standalone');
    }
  </script>
</body>
</html>
