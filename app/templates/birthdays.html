{% extends "base.html" %}
{% block title %}Verjaardagen – FamiliePlanner{% endblock %}
{% block nav_birthdays %}active{% endblock %}

{% block content %}
<div class="page-header">
  <h1 class="page-title">🎂 Verjaardagen</h1>
  <p class="page-subtitle">Beheer verjaardagen en herdenkingen</p>
</div>

<!-- Sorting and filtering controls -->
<div class="filter-row">
  <div class="filter-group">
    <label class="toggle-label">
      <input type="radio" name="sort" value="upcoming" checked />
      <span>Aankomend</span>
    </label>
    <label class="toggle-label">
      <input type="radio" name="sort" value="alphabetical" />
      <span>Alfabetisch</span>
    </label>
  </div>
  <label class="toggle-label">
    <input type="checkbox" id="filter-agenda" />
    <span>Alleen agenda</span>
  </label>
</div>

<!-- Birthdays list -->
<div id="birthdays-list" class="birthdays-grid">
  <div class="skeleton-list">
    <div class="skeleton"></div>
    <div class="skeleton"></div>
  </div>
</div>

<p class="empty-state hidden" id="birthdays-empty">Geen verjaardagen. Voeg de eerste toe! 🎂</p>

<!-- FAB: add birthday -->
<button class="fab" id="btn-add-birthday" aria-label="Verjaardag toevoegen">＋</button>

<!-- Birthday form template -->
<template id="tpl-birthday-form">
  <form id="birthday-form" class="modal-form">
    <h3 class="modal-title" id="birthday-form-title">Verjaardag toevoegen</h3>

    <label>Naam *
      <input type="text" name="name" required minlength="1" maxlength="200" placeholder="Bijv. Oma Annie" />
    </label>

    <div class="form-row birthday-date-row">
      <label class="birthday-day-field">Dag *
        <input type="number" name="day" required min="1" max="31" placeholder="15" />
      </label>
      <label class="birthday-month-field">Maand *
        <select name="month" required>
          <option value="">Kies maand</option>
          <option value="1">Januari</option>
          <option value="2">Februari</option>
          <option value="3">Maart</option>
          <option value="4">April</option>
          <option value="5">Mei</option>
          <option value="6">Juni</option>
          <option value="7">Juli</option>
          <option value="8">Augustus</option>
          <option value="9">September</option>
          <option value="10">Oktober</option>
          <option value="11">November</option>
          <option value="12">December</option>
        </select>
      </label>
      <label class="birthday-year-field">Jaar (optioneel)
        <input type="number" name="year" min="1900" max="2100" placeholder="1985" />
      </label>
    </div>

    <label>Jaar betekenis
      <select name="year_type">
        <option value="no_year">Geen jaar</option>
        <option value="birth_year">Geboortejaar</option>
        <option value="death_year">Sterftejaar</option>
      </select>
    </label>

    <label class="checkbox-label">
      <input type="checkbox" name="show_in_agenda" checked />
      Toon in agenda
    </label>

    <label>Notities (optioneel)
      <textarea name="notes" rows="2" maxlength="500" placeholder="Bijv. Favoriete bloemen"></textarea>
    </label>

    <div class="form-actions">
      <button type="submit" class="btn btn--primary">Opslaan</button>
      <button type="button" class="btn btn--danger hidden" id="btn-delete-birthday">Verwijderen</button>
    </div>
  </form>
</template>
{% endblock %}

{% block extra_js %}
<script src="/static/js/birthdays.js?v={{ static_v }}"></script>
{% endblock %}
